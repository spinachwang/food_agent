# 菜系专家清单 (可插拔入口)
# 新增菜系: 在 agents/cuisines/ 加 .py 文件, 然后在这里加 4 行即可.
# 字段说明:
#   id            - 唯一标识, 字母数字下划线
#   name          - 显示名 (中文)
#   category      - formal_cn | formal_exotic | fast_food | snack | drink
#   subcategory   - 自由分类标签, 便于按需过滤
#   prompt_file   - system prompt 路径 (相对 config/prompts/)
#   knowledge_file - 菜系知识库 (相对 data/cuisines/)
#   enabled       - 是否加载
#   tags          - 标签数组, 用于灵活过滤

cuisines:
  # ============ 中式正餐 (8 大菜系) ============
  - id: sichuan
    name: 川菜
    category: formal_cn
    subcategory: sichuan
    prompt_file: sichuan_v1.md
    knowledge_file: sichuan.md
    enabled: true
    tags: [辣, 重口味, 西南]

