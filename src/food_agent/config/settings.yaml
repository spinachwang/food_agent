# 全局 settings.yaml
# 该文件可被 .env 覆盖; 也可在 CLI 用 --config 指定自定义路径.

environment: development

llm:
  provider: openai_compatible       # qwen-agent 的 model_type
  model: MiniMax-M3
  base_url: https://api.minimaxi.com/v1
  max_tokens: 4096
  temperature: 0.7
  timeout_seconds: 30

# 工具调用容错
tool_caller:
  max_retries: 3
  base_delay_seconds: 1.0
  max_delay_seconds: 30.0
  jitter_ratio: 0.2
  circuit_breaker:
    fail_max: 5
    reset_timeout_seconds: 60

# 主 Agent 调度
master:
  max_rounds: 10                   # 防止死循环
  parallel_cuisines: 3             # 一次最多并行问几个菜系
  stream_output: true
  cost_budget_tokens: 8000         # 单次推荐硬上限

# 记忆
memory:
  short_term:
    max_messages: 30
    summarize_after_tokens: 6000
    keep_last_n_after_summary: 6
  long_term:
    sqlite_path: ./data/food_agent.db
    decay_lambda: 0.01             # 置信度日衰减系数

# 日志
logging:
  level: INFO
  format: json                     # json | console
  trace_enabled: true
  trace_output: ./data/runs/

# 缓存
cache:
  enabled: true
  ttl_seconds: 300                 # 5 分钟
  dir: ./data/cache/

# MCP
mcp:
  config_path: ./src/food_agent/mcp/mcp_servers.json
  use_mock: true                   # mock 模式开关
